<!DOCTYPE html>
<html>
<head>
  <title>Payment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Parking Slot Payment</h2>

<p><b>Slot:</b> <span id="slotName"></span></p>
<p><b>Amount:</b> ₹50</p>

<label>Payment Method:</label><br><br>

<select id="method">
  <option value="">Select</option>
  <option value="UPI">UPI</option>
  <option value="Card">Card</option>
  <option value="Cash">Cash</option>
</select>

<br><br>

<button onclick="pay()">Pay & Book</button>

<script>
  const slotId = localStorage.getItem("slotId");
  const slotName = localStorage.getItem("slotName");
  const user = localStorage.getItem("user");

  if (!user || !slotId) {
    alert("Please login and select slot");
    location.href = "login.html";
  }

  document.getElementById("slotName").innerText = slotName;

  function pay() {
    const method = document.getElementById("method").value;
    if (!method) {
      alert("Select payment method");
      return;
    }

    fetch("/api/book", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        id: slotId,
        user: user,
        method: method
      })
    })
    .then(res => res.json())
    .then(() => {
      alert("Payment successful & slot booked");
      localStorage.removeItem("slotId");
      localStorage.removeItem("slotName");
      location.href = "index.html";
    });
  }
</script>

</body>
</html>
